# ╔══════════════════════════════════════════════════════════╗
# ║  Ghost Protocol — tmux config                           ║
# ║  Prefix: Ctrl-a                                         ║
# ╚══════════════════════════════════════════════════════════╝

# ── Prefix ─────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Terminal & Colors ──────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:Tc,xterm-ghostty:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g status-interval 5

# ── Passthrough & Extended Keys (for Claude Code) ─────────
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM
set -s extended-keys on
set -as terminal-features 'xterm-ghostty:extkeys'

# ── Splits (inherit current path) ─────────────────────────
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ── Pane Navigation (no prefix) ───────────────────────────
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# ── Pane Resize (no prefix) ──────────────────────────────
bind -n M-H resize-pane -L 5
bind -n M-J resize-pane -D 5
bind -n M-K resize-pane -U 5
bind -n M-L resize-pane -R 5

# ── Window Navigation (no prefix) ────────────────────────
bind -n S-Left  previous-window
bind -n S-Right next-window

# ── Agent Team Layouts ───────────────────────────────────
bind t select-layout tiled
bind v select-layout main-vertical \; resize-pane -t 1 -x 55%
bind h select-layout main-horizontal

# ── Claude Code Popup ────────────────────────────────────
bind y run-shell '\
  SESSION="cc-$(echo #{pane_current_path} | md5 -q | cut -c1-8)"; \
  if ! tmux has-session -t "$SESSION" 2>/dev/null; then \
    tmux new-session -d -s "$SESSION" -c "#{pane_current_path}" "claudio"; \
  fi; \
  tmux display-popup -w 90% -h 90% -E "tmux attach-session -t $SESSION"'

# ── Reload Config ────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ── Pane Borders ─────────────────────────────────────────
set -g pane-border-status top
set -g pane-border-format " #{pane_title} "

# ── Auto-detect Window Icons ─────────────────────────────
set -g automatic-rename on
set -g automatic-rename-format '#{?#{==:#{pane_current_command},zsh},#(~/.config/tmux/scripts/icon-detect.sh "zsh" "#W") #W,#(~/.config/tmux/scripts/icon-detect.sh "#{pane_current_command}" "#W") #W}'

# ╔══════════════════════════════════════════════════════════╗
# ║  Status Bar — Catppuccin Mocha (manual, no plugin)      ║
# ╚══════════════════════════════════════════════════════════╝

# Status bar
set -g status-position top
set -g status-style "bg=#313244,fg=#cdd6f4"
set -g status-left-length 40
set -g status-right-length 80

# Left: session name
set -g status-left "#[fg=#11111b,bg=#cba6f7,bold]  #S #[fg=#cba6f7,bg=#313244]"

# Window tabs
set -g window-status-format "#[fg=#7f849c,bg=#313244] #I #W "
set -g window-status-current-format "#[fg=#11111b,bg=#cba6f7] #I #W #[fg=#cba6f7,bg=#313244]"
set -g window-status-separator "#[fg=#45475a]│"

# Right: git branch + pane count + time
set -g status-right "#[fg=#b4befe]#(~/.config/tmux/scripts/git-branch.sh '#{pane_current_path}') #[fg=#6c7086]· #[fg=#7f849c] #{window_panes} #[fg=#6c7086]· #[fg=#7f849c]%H:%M "

# Pane borders
set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#cba6f7"

# Message style
set -g message-style "fg=#cba6f7,bg=#313244"

# ╔══════════════════════════════════════════════════════════╗
# ║  Plugins (TPM)                                          ║
# ╚══════════════════════════════════════════════════════════╝
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-strategy-nvim 'session'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Initialize TPM (keep at bottom)
run '~/.config/tmux/plugins/tpm/tpm'
