"$schema" = 'https://starship.rs/config-schema.json'

command_timeout = 1000

format = """
$directory\
${custom.separator_git}\
$git_branch\
$git_status\
${custom.separator_lang}\
$nodejs\
$python\
${custom.separator_k8s}\
$kubernetes\
${custom.separator_aws}\
$aws\
$cmd_duration\
$line_break\
$character"""

palette = 'catppuccin_mocha'

# ── Directory ──────────────────────────────────────────
[directory]
style = "fg:mauve"
format = "[$path]($style)"
truncation_length = 3
truncation_symbol = "…/"

# ── Git ────────────────────────────────────────────────
[custom.separator_git]
command = "echo '·'"
when = "git rev-parse --is-inside-work-tree 2>/dev/null"
style = "fg:overlay0"
format = " [$output ]($style)"

[git_branch]
symbol = " "
style = "fg:lavender"
format = "[$symbol$branch]($style)"

[git_status]
style = "fg:peach"
format = "[ $all_status$ahead_behind]($style)"
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇡${ahead_count}⇣${behind_count}"
untracked = "?"
stashed = "≡"
modified = "✗"
staged = "+"
renamed = "»"
deleted = "✘"

# ── Languages ──────────────────────────────────────────
[custom.separator_lang]
command = "echo '·'"
when = "test -f package.json || test -f requirements.txt || test -f pyproject.toml || test -f Pipfile"
style = "fg:overlay0"
format = " [$output ]($style)"

[nodejs]
symbol = " "
style = "fg:overlay1"
format = "[$symbol$version]($style)"
detect_files = ["package.json", ".node-version"]
detect_folders = ["node_modules"]

[python]
symbol = " "
style = "fg:overlay1"
format = "[$symbol$version( \\($virtualenv\\))]($style)"

# ── Infrastructure ─────────────────────────────────────
[custom.separator_k8s]
command = "echo '·'"
when = "kubectl config current-context 2>/dev/null"
style = "fg:overlay0"
format = " [$output ]($style)"

[kubernetes]
disabled = false
symbol = "⎈ "
style = "fg:teal"
format = "[$symbol$context]($style)"
detect_files = []
detect_folders = []

[custom.separator_aws]
command = "echo '·'"
when = "test -n \"$AWS_PROFILE\""
style = "fg:overlay0"
format = " [$output ]($style)"

[aws]
symbol = " "
style = "fg:peach"
format = "[$symbol$profile]($style)"

# ── Duration ───────────────────────────────────────────
[cmd_duration]
min_time = 2000
show_milliseconds = false
format = " [$duration]($style)"
style = "fg:overlay0"

# ── Input Line ─────────────────────────────────────────
[line_break]
disabled = false

[character]
success_symbol = "[❯](bold fg:green)"
error_symbol = "[❯](bold fg:red)"
vimcmd_symbol = "[❮](bold fg:green)"

# ── Palette ────────────────────────────────────────────
[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"
